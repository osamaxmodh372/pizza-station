<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent - Pizza Station</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K2DVY72LRQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-K2DVY72LRQ');
    </script>
    <style>
        .success-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .success-box {
            background: white;
            border-radius: 15px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 5px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .success-icon { font-size: 80px; margin-bottom: 20px; }
        .success-box h2 { font-size: 28px; color: #1a1a1a; margin-bottom: 10px; }
        .success-box p { color: #777; margin-bottom: 20px; font-size: 15px; }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .success-box { padding: 30px 20px; }
            .success-icon { font-size: 60px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🍕 Pizza Station</div>
        <ul class="nav-links">
            <li><a href="/" data-key="nav_home">Home</a></li>
            <li><a href="/menu" data-key="nav_menu">Menu</a></li>
            <li><a href="/reservation" data-key="nav_reservation">Reservation</a></li>
            <li><a href="/about" data-key="nav_about">About</a></li>
            <li><a href="/contact" data-key="nav_contact">Contact</a></li>
            <li><a href="/my_reservations" data-key="nav_my_res">My Reservations</a></li>
            <li><button id="langBtn" onclick="toggleLanguage()" class="lang-btn">🌐 العربية</button></li>
        </ul>
    </nav>

    <div class="success-page">
        <div class="success-box">
            <div class="success-icon">✅</div>
            <h2>Message Sent!</h2>
            <p>Your message has been sent successfully. We will get back to you soon.</p>
            <div class="btn-group">
                <a href="/" class="btn">🏠 Home</a>
                <a href="/contact" class="btn" style="background:#1a1a1a;">📧 Send Another</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
